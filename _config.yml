title: Biotica Bio
description: Evidence-led target assessment for startups and investors. Open Targets–based, reproducible, independent.
theme: just-the-docs
url: https://bioticabio.com
# Empty baseurl for local (jekyll serve). GitHub Pages sets baseurl at build time.
baseurl: ""
color_scheme: biotica
lang: en-US

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

author:
  name: Biotica Bio
  url: https://bioticabio.com

twitter:
  username: bioticabio
  card: summary_large_image

social:
  name: Biotica Bio
  links:
    - https://bioticabio.com

seo:
  type: WebSite
  default_image: ""

search_enabled: true
heading_anchors: true

# Optional: add favicon.ico and logo to assets/images/ then uncomment below
# favicon_ico: "/assets/images/favicon.ico"
# logo: "/assets/images/logo.png"

aux_links:
  Contact: /contact/

# Full footer is in _includes/footer_custom.html; leave empty to avoid duplication
footer_content: ""

# Nav: pages use nav_order in front matter; order below matches intended sidebar order
# Home (index) -> What we do -> For startups -> For investors -> Example (parent) -> BRCA2 report -> Progesterone report -> Pro-ocular evaluation -> Progesterone/trigeminal/dry eye -> How it's built -> The platform -> About -> Contact

# Keep generated report artifacts out of navigation on all viewports.
defaults:
  - scope:
      path: "reports/generated"
    values:
      nav_exclude: true
      sitemap: false
      robots: noindex,follow
