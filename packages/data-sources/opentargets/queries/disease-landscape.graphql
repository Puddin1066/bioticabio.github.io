# Disease-level data for competitor/comparable landscape
# Variable: $efoId (e.g. EFO_0000305 breast carcinoma, EFO_0000405 ovarian, EFO_0000615 prostate, EFO_0000616 neoplasm)
query DiseaseLandscape($efoId: String!) {
  disease(efoId: $efoId) {
    id
    name
    therapeuticAreas { id name }
    knownDrugs {
      count
      rows { drugId prefName drugType phase status mechanismOfAction targetId target { approvedSymbol approvedName } }
    }
    associatedTargets(page: { index: 0, size: 25 }, orderByScore: "score desc") {
      count
      rows { score target { id approvedSymbol approvedName } }
    }
  }
}
